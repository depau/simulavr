name: Build Wheels

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip building wheels/sdist; publish site from existing GHCR image'
        type: boolean
        default: false

jobs:
  build_wheels:
    name: Wheels / ${{ matrix.os }}${{ matrix.archs && format(' ({0})', matrix.archs) || '' }}
    runs-on: ${{ matrix.os }}
    if: ${{ github.event.inputs.skip_build != 'true' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-11-arm, macos-15-intel, macos-latest]
        include:
          - os: windows-latest
            archs: AMD64
          - os: windows-latest
            archs: x86

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # required for setuptools-scm tag detection

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4
        env:
          CIBW_ARCHS_WINDOWS: ${{ matrix.archs }}

      - uses: actions/upload-artifact@v6
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.archs || 'auto' }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_build != 'true' }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - run: pip install build

      - run: python -m build --sdist

      - uses: actions/upload-artifact@v6
        with:
          name: sdist
          path: dist/*.tar.gz

  push_oci:
    name: Push wheels to GHCR
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: |
      always() &&
      github.event.inputs.skip_build != 'true' &&
      (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master') &&
      needs.build_wheels.result == 'success' &&
      needs.build_sdist.result == 'success'
    permissions:
      packages: write

    steps:
      - uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download new wheels
        uses: actions/download-artifact@v6
        with:
          pattern: 'wheels-*'
          path: new-dist
          merge-multiple: true

      - name: Download new sdist
        uses: actions/download-artifact@v6
        with:
          name: sdist
          path: new-dist

      - name: Pull existing artifacts from GHCR
        shell: bash
        run: |
          mkdir -p dist
          oras pull "ghcr.io/${{ github.repository }}:wheels" --output dist/ \
            || echo "No existing image found, starting fresh"

      - name: Merge artifacts (new files overwrite same-named old ones)
        shell: bash
        run: cp -f new-dist/* dist/

      - name: Push merged artifacts to GHCR
        shell: bash
        run: |
          cd dist
          files=()
          for f in *.whl *.tar.gz; do [[ -f "$f" ]] && files+=("$f"); done
          oras push "ghcr.io/${{ github.repository }}:wheels" "${files[@]}"

  publish_pages:
    name: Build package index for GitHub Pages
    needs: [push_oci]
    runs-on: ubuntu-latest
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master') &&
      (needs.push_oci.result == 'success' || needs.push_oci.result == 'skipped')
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v5

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull artifacts from GHCR
        shell: bash
        run: |
          mkdir -p dist
          oras pull "ghcr.io/${{ github.repository }}:wheels" --output dist/

      - name: Install tooling
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip dumb-pypi packaging

      - name: Build Pages site
        shell: bash
        env:
          GITHUB_PAGES_URL: ${{ steps.pages.outputs.base_url }}
        run: |
          set -euo pipefail
          python 'scripts/build_index.py'

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy_pages:
    name: Deploy GitHub Pages
    needs: publish_pages
    runs-on: ubuntu-latest
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master') &&
      needs.publish_pages.result == 'success'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
