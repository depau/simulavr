name: Build Wheels

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build_wheels:
    name: Wheels / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, windows-11-arm, macos-15-intel, macos-latest]

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # required for setuptools-scm tag detection

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4

      - uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - run: pip install build

      - run: python -m build --sdist

      - uses: actions/upload-artifact@v5
        with:
          name: sdist
          path: dist/*.tar.gz

  publish_pages:
    name: Build package index for GitHub Pages
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Download wheels
        uses: actions/download-artifact@v5
        with:
          pattern: 'wheels-*'
          path: dist
          merge-multiple: true

      - name: Download sdist
        uses: actions/download-artifact@v5
        with:
          name: sdist
          path: dist

      - name: Install tooling
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip dumb-pypi packaging

      - name: Build Pages site
        shell: bash
        env:
          GITHUB_PAGES_URL: ${{ steps.pages.outputs.base_url }}
        run: |
          set -euo pipefail
          python 'scripts/build_index.py'

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy_pages:
    name: Deploy GitHub Pages
    needs: publish_pages
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

